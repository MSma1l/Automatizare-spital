services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=hospital_db
      - POSTGRES_USER=hospital_user
      - POSTGRES_PASSWORD=hospital_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d hospital_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://hospital_user:hospital_pass@postgres:5432/hospital_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-key-change-in-production
      - JWT_SECRET_KEY=jwt-secret-key-change-in-production
      - AI_SERVICE_URL=http://ai:8001
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - hospital-net
    restart: unless-stopped

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      - DATABASE_URL=postgresql://hospital_user:hospital_pass@postgres:5432/hospital_db
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=/app/models/saved_models
    volumes:
      - ai_models:/app/models/saved_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - hospital-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_WS_URL=/
      # Disable webpack-dev-server HMR WebSocket (avoids ws://localhost/ws errors
      # in production-like reverse-proxy setup). App still hot-reloads when the
      # container sees source changes via docker exec; HMR is only for dev workflow.
      - WDS_SOCKET_PORT=0
      - FAST_REFRESH=false
      - CHOKIDAR_USEPOLLING=false
    depends_on:
      backend:
        condition: service_started
    networks:
      - hospital-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - hospital-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  upload_data:
  ai_models:

networks:
  hospital-net:
    driver: bridge
